<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo - Color Trading Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 WinGo Color Game</h1>
        
        <div class="game-info">
            <p>Balance: $<span id="balance">1000</span></p>
            <p>Game Result: <span id="result">Waiting...</span></p>
        </div>

        <div class="game-board">
            <h2>Select a Color</h2>
            <div class="colors">
                <button class="color-btn red" data-color="red">🔴 RED</button>
                <button class="color-btn green" data-color="green">🟢 GREEN</button>
                <button class="color-btn blue" data-color="blue">🔵 BLUE</button>
            </div>
        </div>

        <div class="betting-section">
            <label for="amount">Bet Amount:</label>
            <input type="number" id="amount" placeholder="Enter amount" min="10" max="1000" value="100">
            <button id="playBtn" class="play-btn">Play Game</button>
        </div>

        <div class="game-history">
            <h3>History</h3>
            <ul id="historyList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
